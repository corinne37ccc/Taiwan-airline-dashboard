<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣直飛日本航點地圖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f4f0; font-family: sans-serif; padding: 24px; }
  #header { margin-bottom: 16px; }
  #header .title { font-size: 28px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
  #header .sub   { font-size: 22px; color: #555; margin-bottom: 14px; }
  #legend { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 16px; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 8px; font-size: 20px; color: #444; }
  .leg-dot  { border-radius: 50%; display: inline-block; flex-shrink: 0; }
  #map-wrap {
    position: relative;
    width: 100%;
    max-width: 900px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #ccc;
    cursor: grab;
  }
  #map-wrap:active { cursor: grabbing; }
  #tooltip {
    position: absolute;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 20px;
    color: #1a1a1a;
    pointer-events: none;
    display: none;
    z-index: 20;
    white-space: nowrap;
    line-height: 1.7;
  }
  svg { width: 100%; display: block; }
</style>
</head>
<body>

<div id="header">
  <div class="title">台灣直飛日本航點・2025年旅客運量</div>
  <div class="sub">滑鼠滾輪縮放・拖曳移動・移至圓點查看詳情</div>
</div>

<div id="legend">
  <span class="leg-item"><span class="leg-dot" style="width:20px;height:20px;background:#9B1C1C;"></span>300萬人以上</span>
  <span class="leg-item"><span class="leg-dot" style="width:16px;height:16px;background:#2E7D7B;"></span>100萬人以上</span>
  <span class="leg-item"><span class="leg-dot" style="width:13px;height:13px;background:#B8896A;"></span>10萬人以上</span>
  <span class="leg-item"><span class="leg-dot" style="width:9px;height:9px;background:#C8C8C8;border:1px solid #aaa;"></span>10萬人以下</span>
</div>

<div id="map-wrap">
  <div id="tooltip"></div>
  <svg id="map-svg"></svg>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const airports = [
  {name:"東京成田",  code:"NRT", lat:35.77, lon:140.38, pax:4035424, lo:[13,-5]   },
  {name:"大阪關西",  code:"KIX", lat:34.43, lon:135.24, pax:3487778, lo:[-64,-11] },
  {name:"沖繩那霸",  code:"OKA", lat:26.20, lon:127.65, pax:1939562, lo:[13,-5]   },
  {name:"東京羽田",  code:"HND", lat:35.55, lon:139.78, pax:1695815, lo:[-64,15]  },
  {name:"福岡",      code:"FUK", lat:33.58, lon:130.45, pax:1306722, lo:[-38,-11] },
  {name:"札幌新千歲",code:"CTS", lat:42.78, lon:141.69, pax:1127207, lo:[13,-5]   },
  {name:"名古屋",    code:"NGO", lat:34.86, lon:136.81, pax:1020937, lo:[13,-5]   },
  {name:"仙台",      code:"SDJ", lat:38.14, lon:140.92, pax:392641,  lo:[13,-5]   },
  {name:"熊本",      code:"KMJ", lat:32.83, lon:130.86, pax:300054,  lo:[13,-5]   },
  {name:"岡山",      code:"OKJ", lat:34.76, lon:133.86, pax:201324,  lo:[13,-5]   },
  {name:"高松",      code:"TAK", lat:34.21, lon:134.01, pax:156438,  lo:[13,-5]   },
  {name:"小松",      code:"KMQ", lat:36.39, lon:136.41, pax:151277,  lo:[-38,-11] },
  {name:"神戶",      code:"UKB", lat:34.63, lon:135.23, pax:148517,  lo:[13,14]   },
  {name:"函館",      code:"HKD", lat:41.78, lon:140.82, pax:142195,  lo:[13,-5]   },
  {name:"廣島",      code:"HIJ", lat:34.44, lon:132.92, pax:69204,   lo:[-38,-11] },
  {name:"松山",      code:"MYJ", lat:33.83, lon:132.70, pax:54784,   lo:[-38,14]  },
  {name:"青森",      code:"AOJ", lat:40.74, lon:140.69, pax:45812,   lo:[-38,-11] },
  {name:"佐賀",      code:"HSG", lat:33.15, lon:130.30, pax:43652,   lo:[-38,-11] },
  {name:"高知",      code:"KCZ", lat:33.55, lon:133.67, pax:34600,   lo:[13,-5]   },
  {name:"花卷",      code:"HNA", lat:39.42, lon:141.14, pax:33575,   lo:[13,-5]   },
  {name:"鹿兒島",    code:"KOJ", lat:31.80, lon:130.72, pax:33082,   lo:[13,-5]   },
  {name:"秋田",      code:"AXT", lat:39.61, lon:140.22, pax:32459,   lo:[-38,-11] },
  {name:"旭川",      code:"AKJ", lat:43.67, lon:142.45, pax:31800,   lo:[13,-5]   },
  {name:"福島",      code:"FKS", lat:37.23, lon:140.43, pax:30983,   lo:[13,-5]   },
  {name:"新潟",      code:"KIJ", lat:37.95, lon:139.11, pax:30941,   lo:[-38,-11] },
  {name:"宮崎",      code:"KMI", lat:31.88, lon:131.45, pax:26528,   lo:[13,-5]   },
  {name:"石垣島",    code:"ISG", lat:24.40, lon:124.25, pax:23615,   lo:[13,-5]   },
  {name:"大分",      code:"OIT", lat:33.48, lon:131.74, pax:23251,   lo:[13,-5]   },
  {name:"茨城",      code:"IBR", lat:36.18, lon:140.42, pax:21500,   lo:[13,14]   },
  {name:"米子",      code:"YGJ", lat:35.50, lon:133.24, pax:17740,   lo:[13,-5]   },
  {name:"下地島",    code:"SHI", lat:24.83, lon:125.15, pax:6585,    lo:[13,-5]   },
  {name:"北九州",    code:"KKJ", lat:33.84, lon:131.03, pax:2843,    lo:[13,-5]   },
  {name:"靜岡",      code:"FSZ", lat:34.80, lon:138.19, pax:927,     lo:[13,-5]   },
  {name:"富山",      code:"TOY", lat:36.65, lon:137.19, pax:0,       lo:[-38,-11] },
];

function getTier(pax) {
  if (pax >= 3000000) return {fill:'#9B1C1C', stroke:'#6B1010', r:11, hr:15, minK:0};
  if (pax >= 1000000) return {fill:'#2E7D7B', stroke:'#1B5250', r:8,  hr:11, minK:0};
  if (pax >= 100000)  return {fill:'#B8896A', stroke:'#8B5E44', r:5.5,hr:8,  minK:1.8};
  return                     {fill:'#C8C8C8', stroke:'#999999', r:3,  hr:5,  minK:1.8};
}

function fmt(n) { return n ? n.toLocaleString() + ' 人' : '資料待補'; }

const landFill = '#e8ede8';
const landStk  = '#b8c8b0';
const seaFill  = '#d0e8f4';
const txtColor = '#1a1a1a';
const halo     = '#e8ede8';

const wrap = document.getElementById('map-wrap');
const svgEl = document.getElementById('map-svg');
const tip   = document.getElementById('tooltip');

const W = Math.min(wrap.clientWidth || 900, 900);
const H = Math.round(W * 1.05);
svgEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
svgEl.setAttribute('height', H);

const svg = d3.select(svgEl);
svg.append('rect').attr('width', W).attr('height', H).attr('fill', seaFill);

const proj = d3.geoMercator()
  .center([137.5, 37.5])
  .scale(W * 2.2)
  .translate([W * 0.52, H * 0.46]);

const pathGen = d3.geoPath(proj);
const gMap    = svg.append('g');
const gDots   = svg.append('g');
const gLabels = svg.append('g');

let curK = 1;
const BASE_FS = 13;

function updateLabels(k) {
  gLabels.selectAll('g.lg').each(function() {
    const sel  = d3.select(this);
    const minK = +sel.attr('data-mink');
    const ox   = +sel.attr('data-ox');
    const oy   = +sel.attr('data-oy');
    const visible = k >= minK;
    sel.attr('transform', 'translate(' + (ox/k) + ',' + (oy/k) + ')');
    sel.attr('opacity', visible ? 1 : 0);
    sel.select('text')
      .attr('font-size', BASE_FS / Math.sqrt(k))
      .attr('stroke-width', 3 / k);
  });
}

const zoom = d3.zoom()
  .scaleExtent([0.6, 12])
  .on('zoom', ev => {
    curK = ev.transform.k;
    gMap.attr('transform', ev.transform);
    gDots.attr('transform', ev.transform);
    gLabels.attr('transform', ev.transform);

    gDots.selectAll('circle').each(function() {
      const br = +d3.select(this).attr('data-r');
      d3.select(this).attr('r', br / Math.sqrt(curK));
    });

    updateLabels(curK);
  });

svg.call(zoom);

d3.json('https://cdn.jsdelivr.net/npm/datamaps@0.5.10/src/js/data/jpn.topo.json').then(topo => {
  const feats = topojson.feature(topo, topo.objects.jpn).features;
  gMap.selectAll('path').data(feats).join('path')
    .attr('d', pathGen)
    .attr('fill', landFill)
    .attr('stroke', landStk)
    .attr('stroke-width', 0.4);

  [...airports].sort((a,b) => a.pax - b.pax).forEach(a => {
    const [x, y] = proj([a.lon, a.lat]);
    if (!x || !y) return;
    const t = getTier(a.pax);

    gDots.append('circle')
      .attr('cx', x).attr('cy', y)
      .attr('r', t.r).attr('data-r', t.r)
      .attr('fill', t.fill).attr('stroke', t.stroke).attr('stroke-width', 0.8)
      .style('cursor','pointer')
      .on('mouseenter', function() {
        d3.select(this).attr('r', t.hr / Math.sqrt(curK));
        tip.innerHTML = '<span style="font-weight:500;">' + a.name + ' (' + a.code + ')</span><br>'
          + '<span style="color:#666;font-size:18px;">2025年旅客：' + fmt(a.pax) + '</span>';
        tip.style.display = 'block';
      })
      .on('mousemove', function(ev) {
        const r = wrap.getBoundingClientRect();
        let lx = ev.clientX - r.left + 14;
        let ly = ev.clientY - r.top - 10;
        if (lx + 220 > W) lx = ev.clientX - r.left - 210;
        tip.style.left = lx + 'px';
        tip.style.top  = ly + 'px';
      })
      .on('mouseleave', function() {
        d3.select(this).attr('r', t.r / Math.sqrt(curK));
        tip.style.display = 'none';
      });

    const ox = (a.lo || [13,-5])[0];
    const oy = (a.lo || [13,-5])[1];

    const lg = gLabels.append('g')
      .attr('class','lg')
      .attr('transform','translate(' + ox + ',' + oy + ')')
      .attr('data-ox', ox).attr('data-oy', oy)
      .attr('data-mink', t.minK)
      .attr('opacity', t.minK === 0 ? 1 : 0);

    lg.append('text')
      .attr('x', x).attr('y', y)
      .attr('font-size', BASE_FS)
      .attr('font-weight','500')
      .attr('fill', txtColor)
      .attr('stroke', halo)
      .attr('stroke-width', 3)
      .attr('paint-order','stroke')
      .attr('pointer-events','none')
      .text(a.name);
  });
}).catch(err => {
  console.error(err);
  svg.append('text')
    .attr('x', W/2).attr('y', H/2)
    .attr('text-anchor','middle')
    .attr('fill','#666').attr('font-size', 16)
    .text('地圖載入失敗，請確認網路連線');
});
</script>
</body>
</html>
